version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: surginerve-db
    restart: always
    environment:
      POSTGRES_USER: surginerve
      POSTGRES_PASSWORD: surginerve
      POSTGRES_DB: surginerve_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surginerve -d surginerve_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: surginerve-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python -m app.ml.train_model &&
        alembic upgrade head &&
        python -m app.utils.seed_db &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

volumes:
  pgdata: